name: Daily SEO Hot Article Generator

on:
  schedule:
    # Run at 00:00, 06:00, 12:00, 18:00 UTC (4 times a day)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install axios openai rss-parser

      - name: Generate 1 Hot SEO Article
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node auto_publish_hot.js

      - name: Re-generate Sitemap & Robots
        run: node generate_sitemap.js

      - name: Commit Generated Articles to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated 4 SEO hot articles [skip ci]" || echo "No changes to commit"
          git push

      - name: FTP Deploy to Laoxue Host
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/airporthub.pro/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.js
            package.json
            package-lock.json
            generated_topics.json
