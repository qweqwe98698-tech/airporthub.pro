        /* 文章专属样式 */
        .review-container { padding: 40px; max-width: 900px; margin: 0 auto; }
        .review-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
        .review-title { font-size: 28px; line-height: 1.4; margin-bottom: 20px; color: #f8fafc; font-weight: 700; }
        .review-meta { display: flex; gap: 20px; color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
        .review-meta span { display: flex; align-items: center; gap: 5px; }
        
        .buy-box { background: rgba(45, 212, 191, 0.05); border: 1px solid rgba(45, 212, 191, 0.2); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .buy-box-info h3 { color: var(--accent); margin-bottom: 5px; }
        .buy-box-info p { color: var(--text-muted); font-size: 13px; }
        .btn-buy { background: var(--accent); color: #000; padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-buy:hover { background: var(--accent-hover); box-shadow: 0 0 15px rgba(45, 212, 191, 0.4); }
        
        .article-content { font-size: 16px; line-height: 1.8; color: #cbd5e1; }
        .article-content h2 { font-size: 22px; color: #fff; margin: 40px 0 20px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
        .article-content h3 { font-size: 18px; color: var(--accent); margin: 25px 0 15px; }
        .article-content p { margin-bottom: 20px; }
        .article-content strong { color: #fff; font-weight: 600; }
        .article-content blockquote { border-left: 4px solid var(--accent); background: var(--bg-card); padding: 15px 20px; margin: 20px 0; border-radius: 0 8px 8px 0; font-style: italic; color: #94a3b8; line-height: 1.6; }
        
        /* 价格表样式 */
        .price-table { width: 100%; border-collapse: collapse; margin: 30px 0; background: var(--bg-card); border-radius: 8px; overflow: hidden; }
        .price-table th, .price-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        .price-table th { background: rgba(0,0,0,0.2); color: #fff; font-weight: 600; }
        .price-table tr:last-child td { border-bottom: none; }
        .price-table tr:hover { background: rgba(255,255,255,0.02); }
        .highlight-price { color: var(--ping-good); font-weight: 700; font-size: 18px; }
        
        /* 蜘蛛网内链样式 */
        .spider-web-links { margin-top: 50px; padding: 25px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
        .spider-web-links h3 { margin-bottom: 15px; color: #fff; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .spider-web-links ul { list-style: none; padding: 0; }
        .spider-web-links li { margin-bottom: 10px; }
        .spider-web-links a { color: var(--accent); text-decoration: none; transition: 0.2s; }
        .spider-web-links a:hover { text-decoration: underline; color: #fff; }
    </style>

    <!-- 引入文章数据源 -->
    <script src="./js/article_data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 获取 URL 中的 id 参数
            const urlParams = new URLSearchParams(window.location.search);
            let providerId = urlParams.get('id');
            
            const root = document.getElementById("review-root");
            const pageTitle = document.getElementById("page-title");

            // 如果未提供 ID，或者数据源里没有这个机场，给个友好的提示
            if(!providerId || !articleData[providerId]){
                root.innerHTML = `
                    <div style="text-align:center; margin-top:100px;">
                        <i class='bx bx-error-circle' style="font-size: 60px; color: var(--ping-warn); margin-bottom:20px;"></i>
                        <h2>抱歉，暂未找到该机场的深度评测文章！</h2>
                        <p style="color:var(--text-muted); margin: 20px 0;">我们正在加班加点为您撰写关于 ${providerId || '该机场'} 的评测...</p>
                        <a href="index.html" class="btn-action" style="display:inline-block;">返回首页</a>
                    </div>
                `;
                return;
            }

            const data = articleData[providerId];
            pageTitle.innerText = data.title;

            // 动态生成蜘蛛网内部链接
            const allKeys = Object.keys(articleData);
            const shuffledKeys = allKeys.sort(() => 0.5 - Math.random());
            const randomPicks = shuffledKeys.slice(0, 5); // 挑 5 个不同的机场
            
            let spiderWebItems = randomPicks.map(key => {
                return \`<li><i class='bx bx-check-circle' style="color:var(--ping-good)"></i> <a href="review.html?id=\${encodeURIComponent(key)}">\${articleData[key].title}</a></li>\`;
            }).join('');
            
            // 补充固定教程链接
            spiderWebItems += \`
                <li><i class='bx bx-check-circle' style="color:var(--ping-warn)"></i> <a href="tutorials.html">【小白教程】2026年最新各大平台客户端保姆级配置教程</a></li>
                <li><i class='bx bx-check-circle' style="color:var(--ping-warn)"></i> <a href="apple_id.html">iOS 必看：美区 Apple ID 免费获取与 Shadowrocket 下载指南</a></li>
            \`;

            // 渲染文章 HTML
            const html = \`
                <div class="review-header">
                    <h1 class="review-title">\${data.title}</h1>
                    <div class="review-meta">
                        <span><i class='bx bx-calendar'></i> 更新于: \${data.date}</span>
                        <span><i class='bx bx-user'></i> 作者: 评测编辑部</span>
                        <span><i class='bx bx-bar-chart'></i> 阅读量: \${data.views}</span>
                    </div>
                    
                    <div class="buy-box">
                        <div class="buy-box-info">
                            <h3>\${providerId} 官方直通车</h3>
                            <p>\${data.desc}</p>
                            \${data.discount ? \`<div style="margin-top: 12px; display: inline-flex; align-items: center; background: rgba(245, 158, 11, 0.1); border: 1px dashed #f59e0b; padding: 6px 12px; border-radius: 6px; color: #f59e0b; font-size: 13px;"><i class='bx bxs-discount' style="margin-right: 6px; font-size: 16px;"></i> 新用户专属优惠码：<strong style="margin-left: 5px; font-family: monospace; font-size: 16px; user-select: all; cursor: pointer; background: rgba(245, 158, 11, 0.2); padding: 2px 6px; border-radius: 4px;" onclick="navigator.clipboard.writeText('\${data.discount}').then(() => alert('优惠码 \${data.discount} 已成功复制！'));">\${data.discount}</strong> <span style="font-size: 12px; opacity: 0.8; margin-left: 8px;">(点击复制)</span></div>\` : ''}
                        </div>
                        <a href="\${data.link}" target="_blank" class="btn-buy">
                            前往官网注册 <i class='bx bx-rocket'></i>
                        </a>
                    </div>
                </div>

                <div class="article-content">
                    \${data.content}
                    
                    <div style="text-align: center; margin: 40px 0;">
                        <a href="\${data.link}" target="_blank" class="btn-buy" style="display: inline-flex; font-size: 18px; padding: 15px 40px;">
                            👉 点击前往 \${providerId} 官网注册使用 👈
                        </a>
                    </div>

                    <!-- 强大的内部 SEO 蜘蛛网系统 (全站动态联结) -->
                    <div class="spider-web-links">
                        <h3><i class='bx bx-link'></i> 相关优质机场评测与教程阅读</h3>
                        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">探索更多同类优质机场，或者学习最新的客户端配置教程：</p>
                        <ul>
                            \${spiderWebItems}
                        </ul>
                    </div>
                </div>
            \`;
            root.innerHTML = html;
        });
    </script>
